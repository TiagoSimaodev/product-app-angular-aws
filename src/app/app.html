<app-navbar></app-navbar>
<div class="container-fluid">
    <div class="card">
        <div class="card-body">
        <div class="card-title"><h4>Produtos</h4></div>
        <form [formGroup]="produtoform" (ngSubmit)="salvar()">
                <div class="form-group">
                    <label for="nome" class="form-label">Nome</label>
                    <input type="text" class="form-control" id="nome" formControlName="nome">
                </div>
                <div class="form-group">
                    <label for="valor" class="form-label">Valor</label>
                    <input type="number" class="form-control" id="valor" formControlName="valor">
                </div>
                <div class="form-group">
                    <label for="descricao" class="form-label">Descrição</label>
                    <textarea name="descricao"  id="descricao"  formControlName="descricao" rows="3" class="form-control"></textarea>
                </div>
                <br/>
                <button class="btn btn-primary" [disabled]="produtoform.invalid">Salvar</button>
        </form>
           

        </div>

    </div>
</div>

<br/>

<div class="container-fluid">
    <div class="card">
     <div class="card-body">
        <div class="card-title"><h4>Lista de Produtos</h4></div>
        <table class="table">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Valor</th>
                    <th>Descrição</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tr *ngFor="let produto of produtos">
                <td>{{produto.nome}}</td>
                <td>{{produto.valor}}</td>
                <td>{{produto.descricao}}</td>
                <td style="width:100px">
                    <div>
                        <button (click)="remover(produto)" class="btn btn-danger btn-sm" type="button">Remover</button>
                    </div>
                </td>
            </tr>
        </table>
     </div>   
    </div>
</div>
<br/>
